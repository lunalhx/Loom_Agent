server:
  port: ${SERVER_PORT:8091}

# 线程池配置
thread:
  pool:
    executor:
      config:
        core-pool-size: 20
        max-pool-size: 50
        keep-alive-time: 5000
        block-queue-size: 5000
        policy: CallerRunsPolicy

# 数据库配置
spring:
  ai:
    model:
      chat: none
    deepseek:
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      api-key: ${DEEPSEEK_API_KEY:test-key}
      chat:
        model: ${DEEPSEEK_MODEL:deepseek-v4-flash}
        temperature: ${DEEPSEEK_TEMPERATURE:0.7}
        max-tokens: ${DEEPSEEK_MAX_TOKENS:2048}
  datasource:
    username: ${MYSQL_USER:root}
    password: ${MYSQL_ROOT_PASSWORD:123456}
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:13306}/${MYSQL_DATABASE:loom_agent}?useUnicode=true&characterEncoding=utf8&autoReconnect=true&zeroDateTimeBehavior=convertToNull&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:16379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT_MS:3000}ms

loom:
  ai:
    connect-timeout-ms: ${AI_CONNECT_TIMEOUT_MS:10000}
    first-token-timeout-ms: ${AI_FIRST_TOKEN_TIMEOUT_MS:30000}
    stream-timeout-ms: ${AI_STREAM_TIMEOUT_MS:120000}
    retry-max-attempts: ${AI_RETRY_MAX_ATTEMPTS:3}
    retry-backoff-initial-ms: ${AI_RETRY_BACKOFF_INITIAL_MS:10}
    retry-backoff-max-ms: ${AI_RETRY_BACKOFF_MAX_MS:50}
    max-message-length: ${AI_MAX_MESSAGE_LENGTH:20000}
    resilience:
      enabled: ${AI_RESILIENCE_ENABLED:true}
      retry-max-attempts: ${AI_RESILIENCE_RETRY_MAX_ATTEMPTS:3}
      retry-backoff-initial-ms: ${AI_RESILIENCE_RETRY_BACKOFF_INITIAL_MS:10}
      retry-backoff-max-ms: ${AI_RESILIENCE_RETRY_BACKOFF_MAX_MS:50}
      circuit-failure-rate-threshold: ${AI_RESILIENCE_CIRCUIT_FAILURE_RATE_THRESHOLD:50}
      circuit-slow-call-rate-threshold: ${AI_RESILIENCE_CIRCUIT_SLOW_CALL_RATE_THRESHOLD:50}
      circuit-slow-call-duration-ms: ${AI_RESILIENCE_CIRCUIT_SLOW_CALL_DURATION_MS:30000}
      circuit-sliding-window-size: ${AI_RESILIENCE_CIRCUIT_SLIDING_WINDOW_SIZE:4}
      circuit-open-state-wait-ms: ${AI_RESILIENCE_CIRCUIT_OPEN_STATE_WAIT_MS:200}
      circuit-half-open-permitted-calls: ${AI_RESILIENCE_CIRCUIT_HALF_OPEN_PERMITTED_CALLS:1}
      overload-fallback-threshold: ${AI_RESILIENCE_OVERLOAD_FALLBACK_THRESHOLD:3}
      fallback-model: ${AI_RESILIENCE_FALLBACK_MODEL:deepseek-v4-pro}
      fallback-stickiness-scope: ${AI_RESILIENCE_FALLBACK_STICKINESS_SCOPE:current_step}
    allowed-models:
      - deepseek-v4-flash
      - deepseek-v4-pro
    model-capabilities:
      deepseek-v4-flash:
        model: deepseek-v4-flash
        context-length: ${DEEPSEEK_FLASH_CONTEXT_LENGTH:1000000}
        max-output-tokens: ${DEEPSEEK_FLASH_MAX_OUTPUT_TOKENS:384000}
        supports-json-output: true
        supports-tool-calls: true
      deepseek-v4-pro:
        model: deepseek-v4-pro
        context-length: ${DEEPSEEK_PRO_CONTEXT_LENGTH:1000000}
        max-output-tokens: ${DEEPSEEK_PRO_MAX_OUTPUT_TOKENS:384000}
        supports-json-output: true
        supports-tool-calls: true
    model-pricing:
      deepseek-v4-flash:
        input-price-per-1k: ${DEEPSEEK_FLASH_INPUT_PRICE_PER_1K:0}
        output-price-per-1k: ${DEEPSEEK_FLASH_OUTPUT_PRICE_PER_1K:0}
      deepseek-v4-pro:
        input-price-per-1k: ${DEEPSEEK_PRO_INPUT_PRICE_PER_1K:0}
        output-price-per-1k: ${DEEPSEEK_PRO_OUTPUT_PRICE_PER_1K:0}
  agent:
    enabled: ${AGENT_ENABLED:true}
    workspace-root: ${AGENT_WORKSPACE_ROOT:.}
    allowed-workspace-roots: ${AGENT_ALLOWED_WORKSPACE_ROOTS:${AGENT_ALLOWED_WORKSPACE_ROOT:${user.home}/Desktop}}
    max-steps: ${AGENT_MAX_STEPS:30}
    total-timeout-ms: ${AGENT_TOTAL_TIMEOUT_MS:1800000}
    step-timeout-ms: ${AGENT_STEP_TIMEOUT_MS:120000}
    tool-timeout-ms: ${AGENT_TOOL_TIMEOUT_MS:3000}
    observation-max-chars: ${AGENT_OBSERVATION_MAX_CHARS:8000}
    parse-error-max-attempts: ${AGENT_PARSE_ERROR_MAX_ATTEMPTS:2}
    file-max-bytes: ${AGENT_FILE_MAX_BYTES:200000}
    search-max-results: ${AGENT_SEARCH_MAX_RESULTS:50}
    approval-ttl-seconds: ${AGENT_APPROVAL_TTL_SECONDS:900}
    shell-timeout-ms: ${AGENT_SHELL_TIMEOUT_MS:120000}
    shell-max-output-chars: ${AGENT_SHELL_MAX_OUTPUT_CHARS:12000}
    high-risk-policy: ${AGENT_HIGH_RISK_POLICY:CONFIRM}
    allowed-shell-commands: ${AGENT_ALLOWED_SHELL_COMMANDS:mvn,./mvnw,git,pwd,ls,rg}
    sub-agent-enabled: ${AGENT_SUB_AGENT_ENABLED:true}
    sub-agent-max-children: ${AGENT_SUB_AGENT_MAX_CHILDREN:6}
    sub-agent-max-concurrency: ${AGENT_SUB_AGENT_MAX_CONCURRENCY:4}
    sub-agent-max-depth: ${AGENT_SUB_AGENT_MAX_DEPTH:1}
    sub-agent-timeout-ms: ${AGENT_SUB_AGENT_TIMEOUT_MS:60000}
    sub-agent-summary-max-chars: ${AGENT_SUB_AGENT_SUMMARY_MAX_CHARS:12000}
    context:
      enabled: ${AGENT_CONTEXT_ENABLED:true}
      storage-root: ${AGENT_CONTEXT_STORAGE_ROOT:${java.io.tmpdir}/loom-agent/context-artifacts}
      persist-tool-result-chars: ${AGENT_CONTEXT_PERSIST_TOOL_RESULT_CHARS:12000}
      tool-preview-chars: ${AGENT_CONTEXT_TOOL_PREVIEW_CHARS:2000}
      keep-recent-tool-results: ${AGENT_CONTEXT_KEEP_RECENT_TOOL_RESULTS:4}
      max-dynamic-entries: ${AGENT_CONTEXT_MAX_DYNAMIC_ENTRIES:60}
      auto-compact-token-limit: ${AGENT_CONTEXT_AUTO_COMPACT_TOKEN_LIMIT:64000}
      reactive-compact-max-attempts: ${AGENT_CONTEXT_REACTIVE_COMPACT_MAX_ATTEMPTS:1}
      reactive-keep-recent-entries: ${AGENT_CONTEXT_REACTIVE_KEEP_RECENT_ENTRIES:5}
      context-safety-margin-tokens: ${AGENT_CONTEXT_SAFETY_MARGIN_TOKENS:4096}
      summary-max-chars: ${AGENT_CONTEXT_SUMMARY_MAX_CHARS:6000}
      deep-summary-model: ${AGENT_CONTEXT_DEEP_SUMMARY_MODEL:}
      deep-summary-chunk-token-limit: ${AGENT_CONTEXT_DEEP_SUMMARY_CHUNK_TOKEN_LIMIT:12000}
      deep-summary-max-calls: ${AGENT_CONTEXT_DEEP_SUMMARY_MAX_CALLS:8}
      deep-summary-max-output-tokens: ${AGENT_CONTEXT_DEEP_SUMMARY_MAX_OUTPUT_TOKENS:2048}
    persistence:
      mode: ${AGENT_PERSISTENCE_MODE:auto}
      required: ${AGENT_PERSISTENCE_REQUIRED:false}
    memory-store:
      ttl-seconds: ${AGENT_MEMORY_STORE_TTL_SECONDS:3600}
      max-runs: ${AGENT_MEMORY_STORE_MAX_RUNS:1000}
      max-approvals: ${AGENT_MEMORY_STORE_MAX_APPROVALS:1000}
      max-trace-runs: ${AGENT_MEMORY_STORE_MAX_TRACE_RUNS:1000}
      max-trace-events-per-run: ${AGENT_MEMORY_STORE_MAX_TRACE_EVENTS_PER_RUN:1000}
      max-checkpoint-runs: ${AGENT_MEMORY_STORE_MAX_CHECKPOINT_RUNS:1000}
      max-checkpoints-per-run: ${AGENT_MEMORY_STORE_MAX_CHECKPOINTS_PER_RUN:5}
      max-context-artifacts: ${AGENT_MEMORY_STORE_MAX_CONTEXT_ARTIFACTS:2000}
      max-context-blobs: ${AGENT_MEMORY_STORE_MAX_CONTEXT_BLOBS:2000}
      max-budget-states: ${AGENT_MEMORY_STORE_MAX_BUDGET_STATES:1000}
      max-sub-agent-inboxes: ${AGENT_MEMORY_STORE_MAX_SUB_AGENT_INBOXES:1000}
      max-sub-agent-messages-per-run: ${AGENT_MEMORY_STORE_MAX_SUB_AGENT_MESSAGES_PER_RUN:10}
    model-recovery:
      escalated-max-tokens: ${AGENT_MODEL_ESCALATED_MAX_TOKENS:8192}
      continuation-max-attempts: ${AGENT_MODEL_CONTINUATION_MAX_ATTEMPTS:3}
      context-fallback-model: ${AGENT_CONTEXT_FALLBACK_MODEL:}
    budget:
      enabled: ${AGENT_BUDGET_ENABLED:false}
      max-total-tokens: ${AGENT_BUDGET_MAX_TOTAL_TOKENS:200000}
      reserved-output-tokens: ${AGENT_BUDGET_RESERVED_OUTPUT_TOKENS:2048}
      estimated-chars-per-token: ${AGENT_BUDGET_ESTIMATED_CHARS_PER_TOKEN:4}
      input-price-per-1k: ${AGENT_BUDGET_INPUT_PRICE_PER_1K:0}
      output-price-per-1k: ${AGENT_BUDGET_OUTPUT_PRICE_PER_1K:0}
      max-total-cost: ${AGENT_BUDGET_MAX_TOTAL_COST:}
    step-budget:
      continuation-enabled: ${AGENT_STEP_BUDGET_CONTINUATION_ENABLED:true}
      max-segments: ${AGENT_STEP_BUDGET_MAX_SEGMENTS:5}
      child-max-segments: ${AGENT_STEP_BUDGET_CHILD_MAX_SEGMENTS:2}
      max-total-steps: ${AGENT_STEP_BUDGET_MAX_TOTAL_STEPS:150}
      same-action-max-repeats: ${AGENT_STEP_BUDGET_SAME_ACTION_MAX_REPEATS:2}
      same-failure-max-repeats: ${AGENT_STEP_BUDGET_SAME_FAILURE_MAX_REPEATS:2}
      no-progress-max-rounds: ${AGENT_STEP_BUDGET_NO_PROGRESS_MAX_ROUNDS:3}

mybatis:
  mapper-locations: classpath:/mybatis/mapper/*.xml
  config-location: classpath:/mybatis/config/mybatis-config.xml

# 日志
logging:
  level:
    root: info
  config: classpath:logback-spring.xml

management:
  prometheus:
    metrics:
      export:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      access: read-only
    prometheus:
      access: read-only
