spring:
  config:
    name: Loom_Agent-app
    import:
      - optional:file:./docs/env/.env[.properties]
      - optional:file:../docs/env/.env[.properties]
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: true
    validate-on-migrate: true
  sql:
    init:
      mode: never

loom:
  agent:
    persistence:
      data-dir: ${LOOM_DATA_DIR:${user.home}/.loom-agent}
      busy-timeout-ms: ${SQLITE_BUSY_TIMEOUT_MS:5000}
      max-pool-size: ${SQLITE_MAX_POOL_SIZE:4}
