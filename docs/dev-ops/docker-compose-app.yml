# /usr/local/bin/docker-compose -f /docs/dev-ops/environment/environment-docker-compose-2.4.yml up -d
# docker-compose --env-file ../env/.env -f docker-compose-app.yml up -d
# 你需要修改system为你自身系统的仓库名
name: ${COMPOSE_PROJECT_NAME:-loom-agent}
services:
  playwright:
    image: mcr.microsoft.com/playwright/mcp
    container_name: ${COMPOSE_PROJECT_NAME:-loom-agent}-playwright
    init: true
    restart: unless-stopped
    entrypoint: node
    command:
      - /app/cli.js
      - --headless
      - --browser
      - chromium
      - --no-sandbox
      - --isolated
      - --port
      - "8931"
      - --host
      - 0.0.0.0
    healthcheck:
      test: [ "CMD", "node", "-e", "fetch('http://127.0.0.1:8931/mcp').then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))" ]
      interval: 5s
      timeout: 3s
      retries: 12
    networks:
      - my-network

  loom-agent-app:
    image: ${APP_IMAGE:-loom-agent-app}:${APP_VERSION:-1.0-SNAPSHOT}
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-loom-agent}-app
    restart: on-failure
    ports:
      - "${APP_HOST_PORT:-8091}:${SERVER_PORT:-8091}"
    env_file:
      - ../env/.env
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - SERVER_PORT=${SERVER_PORT:-8091}
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AGENT_WORKSPACE_ROOT=${CONTAINER_WORKSPACE_ROOT:-/workspace}
      - AGENT_ALLOWED_WORKSPACE_ROOT=${CONTAINER_WORKSPACE_ROOT:-/workspace}
      - AGENT_ALLOWED_WORKSPACE_ROOTS=${CONTAINER_WORKSPACE_ROOTS:-${CONTAINER_WORKSPACE_ROOT:-/workspace}}
      - AGENT_CONTEXT_STORAGE_ROOT=/app/data/context-artifacts
      - PLAYWRIGHT_MCP_TRANSPORT=STREAMABLE_HTTP
      - PLAYWRIGHT_MCP_BASE_URL=http://playwright:8931
    volumes:
      - ${HOST_WORKSPACE_ROOT:-../..}:${CONTAINER_WORKSPACE_ROOT:-/workspace}
      - app-log:/app/data/log
      - app-context-artifacts:/app/data/context-artifacts
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      playwright:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - my-network

networks:
  my-network:
    driver: bridge

volumes:
  app-log:
  app-context-artifacts:
