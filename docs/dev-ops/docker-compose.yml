name: ${COMPOSE_PROJECT_NAME:-loom-agent}

services:
  playwright:
    image: mcr.microsoft.com/playwright/mcp
    container_name: ${COMPOSE_PROJECT_NAME:-loom-agent}-playwright
    init: true
    restart: unless-stopped
    entrypoint: node
    command:
      - /app/cli.js
      - --headless
      - --browser
      - chromium
      - --no-sandbox
      - --isolated
      - --port
      - "8931"
      - --host
      - 0.0.0.0
    healthcheck:
      test: [ "CMD", "node", "-e", "fetch('http://127.0.0.1:8931/mcp').then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))" ]
      interval: 5s
      timeout: 3s
      retries: 12
    networks:
      - my-network

  app:
    image: ${APP_IMAGE:-loom-agent-app}:${APP_VERSION:-1.0-SNAPSHOT}
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-loom-agent}-app
    restart: unless-stopped
    env_file:
      - ../env/.env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      SERVER_PORT: ${SERVER_PORT:-8091}
      AGENT_PERSISTENCE_MODE: sqlite
      LOOM_DATA_DIR: /app/data
      AGENT_WORKSPACE_ROOT: ${CONTAINER_WORKSPACE_ROOT:-/workspace}
      AGENT_ALLOWED_WORKSPACE_ROOT: ${CONTAINER_WORKSPACE_ROOT:-/workspace}
      AGENT_ALLOWED_WORKSPACE_ROOTS: ${CONTAINER_WORKSPACE_ROOTS:-${CONTAINER_WORKSPACE_ROOT:-/workspace}}
      PLAYWRIGHT_MCP_TRANSPORT: STREAMABLE_HTTP
      PLAYWRIGHT_MCP_BASE_URL: http://playwright:8931
    ports:
      - "${APP_HOST_PORT:-8091}:${SERVER_PORT:-8091}"
    volumes:
      - ${HOST_WORKSPACE_ROOT:-../..}:${CONTAINER_WORKSPACE_ROOT:-/workspace}
      - app-data:/app/data
    depends_on:
      playwright:
        condition: service_healthy
    networks:
      - my-network

networks:
  my-network:
    driver: bridge

volumes:
  app-data:
