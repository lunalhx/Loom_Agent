# 命令执行 docker-compose --env-file ../env/.env -f docker-compose-environment-aliyun.yml up -d
# docker 代理和使用文档；https://bugstack.cn/md/road-map/docker.html
name: ${COMPOSE_PROJECT_NAME:-loom-agent}
services:
  mysql:
    image: registry.cn-hangzhou.aliyuncs.com/xfg-studio/mysql:8.0.32
    container_name: ${COMPOSE_PROJECT_NAME:-loom-agent}-mysql
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    env_file:
      - ../env/.env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-loom_agent}
    ports:
      - "${MYSQL_HOST_PORT:-13306}:3306"
    volumes:
      - ./mysql/my.cnf:/etc/mysql/conf.d/mysql.cnf:ro
      - ./mysql/sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD", "mysqladmin" ,"ping", "-h", "localhost" ]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 15s
    networks:
      - my-network

  # phpmyadmin https://hub.docker.com/_/phpmyadmin
  phpmyadmin:
    image: registry.cn-hangzhou.aliyuncs.com/xfg-studio/phpmyadmin:5.2.1
    container_name: ${COMPOSE_PROJECT_NAME:-loom-agent}-phpmyadmin
    hostname: phpmyadmin
    ports:
      - ${PHPMYADMIN_HOST_PORT:-8899}:80
    env_file:
      - ../env/.env
    environment:
      - PMA_HOST=mysql
      - PMA_PORT=3306
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - my-network

  # Redis
  redis:
    image: registry.cn-hangzhou.aliyuncs.com/xfg-studio/redis:6.2
    container_name: ${COMPOSE_PROJECT_NAME:-loom-agent}-redis
    restart: always
    hostname: redis
    privileged: true
    env_file:
      - ../env/.env
    ports:
      - ${REDIS_HOST_PORT:-16379}:6379
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - my-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3

  # RedisAdmin https://github.com/joeferner/redis-commander
  # 账密 admin/admin
  redis-admin:
    image: registry.cn-hangzhou.aliyuncs.com/xfg-studio/redis-commander:0.8.0
    container_name: ${COMPOSE_PROJECT_NAME:-loom-agent}-redis-admin
    hostname: redis-commander
    restart: always
    ports:
      - ${REDIS_ADMIN_HOST_PORT:-8081}:8081
    env_file:
      - ../env/.env
    environment:
      - REDIS_HOSTS=local:redis:6379
      - HTTP_USER=admin
      - HTTP_PASSWORD=admin
      - LANG=C.UTF-8
      - LANGUAGE=C.UTF-8
      - LC_ALL=C.UTF-8
    networks:
      - my-network
    depends_on:
      redis:
        condition: service_healthy

networks:
  my-network:
    driver: bridge
